<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>트랜스폼</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 50px;
      }
      .exam-wrap {
        background-color: #3cc;
        border: 1px solid #000;
        padding: 30px;
      }
      .img-wrap {
        background-color: beige;
        border: 1px solid #ff0000;
        width: 300px;
        overflow: hidden;
      }

      .img-wrap img {
        /* opacity: 0.5; */
        width: 100%;
        display: block;
      }
      .img-wrap img:hover {
        transform: scale(1.5);
        transform-origin: top center;
        transition: 1s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="exam-wrap">
      <div class="img-wrap">
        <img src="../images/test-img.png" alt="" />
      </div>
    </div>
  </body>
</html>

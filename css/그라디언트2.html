<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오로라 메시 그라디언트</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #000;
      }

      .exam {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: radial-gradient(circle at 30% 30%, cyan, transparent),
                    radial-gradient(circle at 70% 70%, purple, transparent),
                    radial-gradient(circle at 50% 50%, #e7ca0e, transparent),
                    radial-gradient(circle at 80% 20%, magenta, transparent);
        mix-blend-mode: screen;
      }

      .text {
        position: relative;
        color: white;
        font-size: 2rem;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="exam"></div>
    <div class="text">텍스트 위치</div>
  </body>
</html>

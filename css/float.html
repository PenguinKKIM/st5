<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플로트</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ol,
      ul {
        list-style: none;
      }
      header,
      footer {
        background-color: #ccc;
      }
      footer {
        min-height: 200px;
      }
      .content {
        background-color: #e7e5e5;
        width: 1000px;
        margin: auto;
      }
      .content > .box {
        background-color: #e7e5e5;
      }
      .content > .box1 {
        background-color: goldenrod;
        min-height: 100px;
        width: 150px;
      }
      .content > .box2 {
        background-color: rgb(255, 145, 145);
        min-height: 200px;
        width: 100px;
      }
      .content > .box3 {
        background-color: cornflowerblue;
        min-height: 300px;
        width: 100px;
      }
    </style>
  </head>

  <body>
    <div class="warp">
      <header>헤더</header>
      <main class="content">
        <div class="box box1">내용</div>
        <div class="box box2">내용</div>
        <div class="box box3">내용</div>
      </main>
      <footer>푸터</footer>
    </div>
  </body>
</html>

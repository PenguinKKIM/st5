<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .wrap {
      }
      .wrap > .section:nth-child(odd) {
        background-color: #68f;
      }
      .wrap > .section:nth-child(even) {
        background-color: #f68;
      }
      .section > .section_title {
        box-sizing: border-box;
        background-color: #fff;
        /* line-height: 50px; */
        font-size: 2em;
        padding: 1em 2em;
      }
      .section > .content-wrap {
        background-color: beige;
        height: 150vh;
      }
      .section > .section_title,
      .content-wrap {
        width: 80%;
        margin: 0 auto;
      }
      .wrap .section_title {
        position: sticky;
        top: 50px;
      }
      /* .wrap .section2 {
        position: sticky;
        top: 0;
      }
      .wrap .section3 {
        position: sticky;
        top: 0;
      }
      .wrap .section4 {
        position: sticky;
        top: 0;
      } */
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="section section1">
        <p class="section_title">section1</p>
        <div class="content-wrap"></div>
      </section>
      <section class="section section2">
        <p class="section_title">section2</p>
        <div class="content-wrap"></div>
      </section>
      <section class="section section3">
        <p class="section_title">section3</p>
        <div class="content-wrap"></div>
      </section>
      <section class="section section4">
        <p class="section_title">section4</p>
        <div class="content-wrap"></div>
      </section>
    </div>
  </body>
</html>

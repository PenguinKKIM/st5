<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>박스모델</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        /* 상 우 하 좌 */
        /* 상 우하 좌 */
        /* 상하 좌우 > 수평 먼저 */
        /* 전체 */

        background-color: #ccc;
        margin: 50px;
        width: 200px;
        height: 200px;
      }
      .box2 {
        border: 10px solid red;
        border-right: 6px dotted blue;
        border-bottom: 4px dashed green;
        border-left: 10px double;
        padding: 10px 20px 30px 40px;
      }
      .box3 {
        /* 테두리 두께 , 테두리 스타일 , 테두리 색  */
        border: 10px dashed blue;
        padding: 10px 50px 30px;
      }
      .box4 {
        border: 10px dashed blue;
        border-left: none;
        border-right: none;
      }
    </style>
  </head>
  <body>
    <div class="box box1">박스1</div>
    <div class="box box2">박스2</div>
    <div class="box box3">박스3</div>
    <div class="box box4">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quod beatae ea id delectus amet, nulla dolorem minima tempora vel? Placeat cum, velit illo quidem quos quisquam explicabo magnam et
      praesentium.
    </div>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .warp {
        margin: 50px;
        background-color: #ccc;
        padding: 20px;
      }
      .warp .section {
        padding: 20px;
        background-color: rgb(251, 229, 199);
      }
      .warp .section .parent {
        position: relative;
        background-color: beige;
        padding: 20px;
      }
      .warp .section .parent .child:nth-child(1) {
        background-color: magenta;
        padding: 10px;
        width: 50px;
        height: 50px;
        box-sizing: border-box;
      }
      .warp .section .parent .child:nth-child(2) {
        position: absolute;
        top: 0;
        right: 0;
        background-color: cyan;
        padding: 10px;
        width: 50px;
        height: 50px;
        /* box-sizing: border-box; */
      }
    </style>
  </head>
  <body>
    <div class="warp">
      <section class="section">
        <div class="parent">
          <div class="child">child1</div>
          <div class="child">child2</div>
        </div>
      </section>
    </div>
  </body>
</html>

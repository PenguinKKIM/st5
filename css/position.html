<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포지션</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
    }

    .thumb {
      position: relative;
    }

    .thumb img {
      display: block;
      width: 100%;
    }

    .thumb > div {
      position: absolute;
    }

    .thumb > .inner__top {
      left: 10px;
      right: 10px;
      top: 10px;
      display: flex;
      justify-content: space-between;
    }
    .thumb > .inner__top > button {
      background-color: rgba(255, 255, 255, 0.5);
    }

    .thumb > .inner__top > button:nth-child(2) {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .thumb > .inner__middle {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      justify-content: center;
      gap: 14px;
    }

    .thumb:hover .inner__middle {
      display: flex;
    }

    .thumb:hover img {
      opacity: 0.5;
    }

    .thumb button {
      background-color: rgba(0, 0, 0, 0);
      border: none;
    }

    .thumb button:hover {
      cursor: pointer;
    }
  </style>
  <body>
    <div class="wrap">
      <div class="thumb">
        <img src="images/test-img.png" alt="모델이미지" />
        <div class="inner__top">
          <button>좋아요</button>
          <button>10%</button>
        </div>
        <div class="inner__middle">
          <button>wish</button>
          <button>add</button>
          <button>option</button>
        </div>
      </div>
      <div class="thumb">

        <div class="inner__top">

        </div>
        <div class="inner__middle">

        </div>
      </div>

        <div class="inner__top">

</html>

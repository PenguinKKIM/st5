    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .exam {
        width: 100%;
        height: 100vh;
        background:
          radial-gradient(circle at 30% 30%, cyan, transparent), radial-gradient(circle at 70% 70%, purple, transparent), radial-gradient(circle at 50% 50%, #e7ca0e, transparent),
          radial-gradient(circle at 80% 20%, magenta, transparent);
        mix-blend-mode: screen;
        font-weight: 200;
        text-align: center;
        align-content: center;
      }
      .exam > .text-wrap {
        display: inline-block;
      }
      .exam > .text-wrap > .title {
        font-family: "Nanum Pen Script", cursive;
        font-size: 6.25rem;
        letter-spacing: 2rem;
        color: aliceblue;
        text-shadow: 12px 2px 18px rgba(0, 0, 212, 0.8);
      }
      .exam > .text-wrap > .desc {
        font-family: "Noto Sans KR", sans-serif;
        margin-top: -35px;
        letter-spacing: 0.625rem;
      }
    </style>
  </head>
  <body>
    <div class="exam">
      <div class="text-wrap">
        <div class="title">SEAL</div>
        <div class="desc">여름을 전하는 감사인사</div>
      </div>
    </div>
  </body>

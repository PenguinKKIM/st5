<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>폼태그</title>
  </head>
  <body>
    <h1>폼태그</h1>
    <form action="">
      <fieldset>
        <legend>폼의 이름표</legend>
        <p>
          <label for="">
            아이디
            <input type="text" />
          </label>
          <input type="text" placeholder="이름" />
          <label for="pwd">비밀번호</label>
          <input type="password" placeholder="비밀번호" name="" id="pwd" />
        </p>
        <p>
          <input type="number" name="" id="" /> <br />
          <input type="email" name="" id="" />
        </p>
        <p>
          <input type="date" name="" id="" />
          <input type="week" name="" id="" />
        </p>
        <p>
          <input type="range" name="" id="" />
          <input type="color" name="" id="" />
        </p>
      </fieldset>
      <fieldset>
        <legend>선택상자</legend>
        <div>
          <!-- value 값이 넘어가는것 -->
          <label for="color1">빨강</label>
          <input type="checkbox" name="color" id="color1" value="red" />

          <label for="color2">파랑</label>
          <input type="checkbox" name="color" id="color2" value="blue" />

          <label for="color3">노랑</label>
          <input type="checkbox" name="color" id="color3" value="yellow" />
        </div>
      </fieldset>
      <fieldset>
        <legend>라디오버튼</legend>
        <label for="color4">빨강</label>
        <input type="radio" name="color" id="color4" />

        <label for="color5">파랑</label>
        <input type="radio" name="color" id="color5" />

        <label for="color6">노랑</label>
        <input type="radio" name="color" id="color6" />
      </fieldset>
      <div>
        <input type="reset" />
        <input type="submit" />
        <input type="reset" value="취소" />
        <input type="submit" value="확인" />
        <input type="button" value="주소찾기" />
        <input type="file" name="" id="" />
      </div>
      <div>
        <button>제목</button>
        <button type="button">제목</button>
        <button type="reset">취소</button>
        <button type="submit">확인</button>
        <button disabled="disabled">사용불가</button>
        <button type="button">
          <img src="./asset/logo.png" alt="" width="50" />
        </button>
      </div>
      <div>
        <select name="" id="">
          <option value="">패밀리사이트</option>
          <option value="">구글</option>
          <option value="">네이버</option>
          <option value="">다음</option>
        </select>
        <select name="" id="" multiple>
          <option value="">패밀리사이트</option>
          <option value="">구글</option>
          <option value="">네이버</option>
          <option value="">다음</option>
        </select>
      </div>
      <div>
        <textarea name="" id="" cols="30" rows="5"></textarea>
        <textarea name="" id="" cols="30" rows="5" disabled readonly>123456789</textarea>
      </div>
      <style>
        body {
          height: 2000px;
        }

        div {
          margin: 0 0 50px 0;
        }

        button,
        [type="submit"] {
          background-color: #f00;
        }

        textarea {
          resize: none;
        }
      </style>
    </form>
  </body>
</html>

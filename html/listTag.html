<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목록태그1</title>
  </head>
  <body>
    <h1>목록태그</h1>
    <h2>목록의 순서가있는 태그</h2>
    <p>목록의 순서의 의미가 중요</p>
    <p>
      <!-- HTML 특수문자 코트 "&" 로 시작 ";" 로 종결 -->
      <!-- 공뱍을 처리하고싶으면 공백에 해당되는 부분을 넣을것 &nbsp; -->
      <!-- 퍼블&nbsp;&nbsp;&nbsp;리싱 -->
      &lt; ol &gt; 태그는 &lt; li &gt; 태그를 자식으로 가집니다.
    </p>
    <hr />
    <p class="titie">ol의 예제</p>
    <!-- $ : 1 ~9 까지의 숫자가 자동으로 배치(넘버링)
    {} : {텍스트} 해당되는 내용이 나오게 됨  -->

    <ol>
      <li>목록의 항목1</li>
      <li>항목</li>
      <li>목록의 항목2</li>
      <li>목록의 항목3</li>
      <li>항목</li>
    </ol>
    <hr />
    <h2>순서가 없는 목록</h2>
    <ul>
      <li>&lt; ul &gt; &lt; /ul &gt;</li>
      <li>&lt; li &gt; 태그를 자식으로 가집니다.</li>
      <li>순서의 의미가 없다</li>
      <li>네비게이션의 목록으로 많이 사용</li>
    </ul>
  </body>
</html>
